# SAM2 Annotation Tool Configuration

# Model settings
model:
  path: "D:/模型库/SAM2/sam2_hiera_tiny.pt"
  config_path: "D:/模型库/SAM2/sam2_hiera_t.yaml"
  device: "cuda"

# Polygon settings (新增)
polygon:
  # 多边形顶点密度配置
  epsilon_factor: 0.005  # 可选值: 0.01(低密度~13顶点), 0.005(中密度~25-50顶点), 0.002(高密度~50-100顶点)
  max_vertices: 100      # 最大顶点数限制，防止性能问题

# Quality settings (新增)
quality:
  # 质量评估配置
  enable_metrics: true   # 是否启用质量评估
  min_vertex_density: 5  # 最小顶点密度（每100px边长的顶点数）

# Feature switches (新增)
features:
  high_density_polygon: true   # false时使用旧epsilon=0.01
  quality_metrics: true        # false时不计算质量指标
  class_hierarchy: false       # false时使用旧类别列表

# UI settings
ui:
  theme: "dark"
  canvas_background: "#2a2a2a"
  mask_opacity: 0.5
  mask_color_positive: "#00ff00"
  mask_color_negative: "#ff0000"
  polygon_line_width: 2
  point_size: 8

# Default annotation classes (扩展层级结构)
classes:
  # General objects
  - name: "object"
    id: 0
    color: "#00ff00"
    supercategory: "general"
  # Living beings
  - name: "person"
    id: 1
    color: "#ff0000"
    supercategory: "living"
  # Vehicles
  - name: "car"
    id: 2
    color: "#0000ff"
    supercategory: "vehicle"
  - name: "truck"
    id: 3
    color: "#ff00ff"
    supercategory: "vehicle"
  - name: "bus"
    id: 4
    color: "#ffff00"
    supercategory: "vehicle"
  # Animals
  - name: "cat"
    id: 5
    color: "#ff9900"
    supercategory: "animal"
  - name: "dog"
    id: 6
    color: "#99ff00"
    supercategory: "animal"
  - name: "bird"
    id: 7
    color: "#00ffff"
    supercategory: "animal"
  # Nature
  - name: "tree"
    id: 8
    color: "#006600"
    supercategory: "nature"
  - name: "flower"
    id: 9
    color: "#ff66ff"
    supercategory: "nature"
  # Structures
  - name: "building"
    id: 10
    color: "#666666"
    supercategory: "structure"
  - name: "house"
    id: 11
    color: "#996666"
    supercategory: "structure"

# Export settings
export:
  default_format: "coco"
  output_dir: "./annotations"